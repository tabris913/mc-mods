#Random Biome Dimensions Server Config
#This file is auto-generated on first server start at: world/serverconfig/randombimedimensions-server.toml

[dimensions]
    #World border size (one side length in blocks)
    #Range: 100 ~ 100000
    worldSize = 1000
    #Portal frame blocks for each dimension. List length = number of dimensions.
    portalBlocks = ["minecraft:crying_obsidian", "minecraft:prismarine", "minecraft:purpur_block", "minecraft:end_stone_bricks"]

[difficulty]
    #Distance in blocks between difficulty increases
    #Range: 10 ~ 10000
    difficultyInterval = 500
    #Health multiplier per difficulty step
    #Range: 1.0 ~ 10.0
    healthMultiplier = 1.5
    #Attack multiplier per difficulty step
    #Range: 1.0 ~ 10.0
    attackMultiplier = 1.2
    #Defense multiplier per difficulty step
    #Range: 1.0 ~ 10.0
    defenseMultiplier = 1.1

[loot]
    #Custom loot table resource location applied to all mobs in RBD dimensions
    lootTable = "randombimedimensions:rbd_mob_drops"

[biomes]
    #List of biome resource locations available for dimension generation.
    #Use 'namespace:*' wildcard to include all biomes from a mod.
    #Only biomes that are actually loaded (from installed mods) will be used.
